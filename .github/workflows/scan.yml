name: DevInspector

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scan:
    name: Build and scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"

      - name: Build
        run: go build -o devinspector ./cmd/app

      - name: Run DevInspector
        run: ./devinspector scan --format=json .
